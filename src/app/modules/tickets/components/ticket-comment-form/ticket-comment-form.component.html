<form [formGroup]="commentForm" (ngSubmit)="onSubmit()">
  <div class="mb-3">
    <label for="comment" class="block text-sm font-medium text-gray-700 mb-1">
      Agregar comentario
    </label>
    <textarea
      id="comment"
      formControlName="comment"
      rows="3"
      placeholder="Escribe un comentario..."
      class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm text-sm
             focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
             resize-none placeholder-gray-400"
    ></textarea>
    @if (commentForm.get('comment')?.touched && commentForm.get('comment')?.hasError('required')) {
      <p class="mt-1 text-xs text-red-600">El comentario no puede estar vacío</p>
    }
  </div>

  <!-- <div class="mb-3">
    <app-file-upload (filesSelected)="onFilesSelected($event)"></app-file-upload>
  </div> -->

  <div class="flex justify-end">
    <button
      type="submit"
      [disabled]="commentForm.invalid || isSubmitting()"
      class="inline-flex items-center px-4 py-2 bg-indigo-600 hover:bg-indigo-700
             disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium
             rounded-lg shadow-sm transition-colors focus:outline-none focus:ring-2
             focus:ring-indigo-500 focus:ring-offset-2">
      @if (isSubmitting()) {
        <div class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full mr-2"></div>
      }
      Comentar
    </button>
  </div>
</form>
