<div class="file-upload-container" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)" [class.drag-over]="isDragging">

    <div class="upload-zone p-4 border-2 border-dashed rounded-lg text-center">
        <input type="file" #fileInput [multiple]="allowMultiple" [accept]="acceptedFormats" style="display: none;"
            (change)="onFileSelected($event)">

        <ng-container *ngIf="selectedFiles.length === 0; else filesList">
            <mat-icon class="text-gray-400 text-5xl">cloud_upload</mat-icon>
            <p class="mt-2 text-sm text-gray-500">
                <span class="font-semibold">Haz clic para cargar</span> o arrastra y suelta archivos aquí
            </p>
            <p class="text-xs text-gray-400 mt-1">
                {{ formatSizeLimit(maxFileSize) }} máx. {{ allowMultiple ? 'por archivo' : '' }}
            </p>
            <button mat-raised-button color="primary" class="mt-3" (click)="fileInput.click()">
                Seleccionar archivo{{ allowMultiple ? 's' : '' }}
            </button>
        </ng-container>

        <ng-template #filesList>
            <div class="selected-files">
                <h4 class="text-sm font-medium mb-2">Archivos seleccionados ({{ selectedFiles.length }})</h4>

                <div class="files-list">
                    <mat-chip-set class="w-full">
                        <mat-chip *ngFor="let file of selectedFiles; let i = index" class="flex items-center">
                            <mat-icon class="mr-1 text-sm">{{ getFileIcon(file.name) }}</mat-icon>
                            <span class="truncate max-w-xs">{{ file.name }}</span>
                            <span class="text-xs ml-1 text-gray-500">({{ formatSize(file.size) }})</span>
                            <button matChipRemove (click)="removeFile(i)">
                                <mat-icon>cancel</mat-icon>
                            </button>
                        </mat-chip>
                    </mat-chip-set>
                </div>

                <div class="flex justify-between mt-3">
                    <button mat-stroked-button color="primary" (click)="fileInput.click()">
                        <mat-icon class="mr-1">add</mat-icon>
                        Agregar más
                    </button>
                    <button mat-stroked-button color="warn" (click)="clearFiles()">
                        <mat-icon class="mr-1">delete</mat-icon>
                        Limpiar todo
                    </button>
                </div>
            </div>
        </ng-template>
    </div>
</div>
